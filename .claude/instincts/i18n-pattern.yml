# Dual-Layer i18n: Messages + Prompt Catalog

## Action
1. User-facing UI messages: add keys to `messages/{en,zh}/*.json` (both languages required)
2. AI prompt templates: add to `src/lib/prompt-i18n/catalog.ts` with ID registered in `src/lib/prompt-i18n/prompt-ids.ts`
3. Use `[locale]` dynamic segment in Next.js App Router for language routing
4. Navigation/routing config in `src/i18n/routing.ts` and `src/i18n/navigation.ts`

