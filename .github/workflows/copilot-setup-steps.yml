# This workflow sets up the environment for GitHub Copilot cloud agent.
# Copilot runs these steps before working on any task in this repository.
# See: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/cloud-agent

name: Copilot Setup Steps

on:
  workflow_call:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # postinstall automatically runs `prisma generate`
        # DATABASE_URL is required by prisma generate (no real DB needed)
        run: npm ci
        env:
          DATABASE_URL: mysql://copilot:copilot@localhost:3306/copilot

      - name: Run type check
        run: npm run typecheck
        env:
          DATABASE_URL: mysql://copilot:copilot@localhost:3306/copilot
          NEXTAUTH_SECRET: copilot-secret-placeholder
          NEXTAUTH_URL: http://localhost:3000

      - name: Run lint
        run: npm run lint:all
        env:
          DATABASE_URL: mysql://copilot:copilot@localhost:3306/copilot

      - name: Run unit tests (no DB required)
        run: npm run test:behavior:full
        env:
          DATABASE_URL: mysql://copilot:copilot@localhost:3306/copilot
          BILLING_TEST_BOOTSTRAP: '0'
          NEXTAUTH_SECRET: copilot-secret-placeholder
          NEXTAUTH_URL: http://localhost:3000
